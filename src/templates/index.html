<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora CI/CD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; }
    .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.5rem; width: 100%; max-width: 400px; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    .ops { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .op-btn { padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .op-btn.active { background: #EEF2FF; border-color: #6366f1; color: #4338ca; font-weight: 500; }
    .result-box { background: #f9f9f9; border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 12px; min-height: 70px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .result-val { font-size: 30px; font-weight: 500; }
    .result-val.error { font-size: 14px; color: #dc2626; }
    .calc-btn { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 500; }
    .calc-btn:hover { background: #f5f5f5; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #dcfce7; color: #166534; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓ API activa</div>
    <h1>Calculadora</h1>
    <p class="sub">Ingresá los valores y elegí la operación</p>
    <div class="row">
      <div><label>Valor A</label><input type="number" id="va" value="10"></div>
      <div><label>Valor B</label><input type="number" id="vb" value="3"></div>
    </div>
    <div class="ops">
      <button class="op-btn active" data-op="sumar">+ Sumar</button>
      <button class="op-btn" data-op="restar">− Restar</button>
      <button class="op-btn" data-op="multiplicar">× Multiplicar</button>
      <button class="op-btn" data-op="dividir">÷ Dividir</button>
    </div>
    <div class="result-box">
      <div class="result-label" id="result-label">Resultado</div>
      <div class="result-val" id="result-val">—</div>
    </div>
    <button class="calc-btn" onclick="calcular()">Calcular</button>
  </div>
  <script>
    let op = 'sumar';
    document.querySelectorAll('.op-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        op = btn.dataset.op;
      };
    });
    async function calcular() {
      const a = document.getElementById('va').value;
      const b = document.getElementById('vb').value;
      const label = document.getElementById('result-label');
      const val = document.getElementById('result-val');
      val.textContent = '...';
      val.className = 'result-val';
      try {
        const res = await fetch(`/${op}?a=${a}&b=${b}`);
        const data = await res.json();
        if (data.error) {
          val.textContent = data.error;
          val.className = 'result-val error';
          label.textContent = 'Error';
        } else {
          val.textContent = Number(data.resultado.toFixed(4));
          label.textContent = `${a} ${op} ${b}`;
        }
      } catch(e) {
        val.textContent = 'Error de conexión';
        val.className = 'result-val error';
      }
    }
  </script>
</body>
</html>
